name: DevSecOps Security Pipeline

# Security gates run on every push and pull request (shift-left).
# All three jobs are static analysis, so they run in parallel and act as
# blocking gates: any finding fails the job and stops the pipeline.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # GATE 1 - Secret scanning (fastest, runs on raw source before anything else)
  secret-scanning:
    name: Gate 1 - Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --redact --verbose

  # GATE 2 - SAST (analyses our own source code)
  sast:
    name: Gate 2 - SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (registry packs + project rules)
        # p/java and p/secrets are downloaded from the public Semgrep registry on
        # the runner; .semgrep/ adds our own project-specific, deterministic rules.
        run: semgrep scan --config p/java --config p/secrets --config .semgrep/ --error .

  # GATE 3 - SCA (analyses third-party dependencies in pom.xml)
  sca:
    name: Gate 3 - SCA (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'          # fail the gate when a HIGH/CRITICAL CVE is found
          scanners: vuln
